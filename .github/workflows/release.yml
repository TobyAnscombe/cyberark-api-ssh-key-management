---
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        run: gh release view ${{ github.ref_name }} 2>/dev/null || gh release create ${{ github.ref_name }} --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
