---
# Per-account key rotation. Called in a loop with _account set to the CyberArk
# account dict. Steps:
#   1. Capture existing managed keys on the target host (to know what N-1 is)
#   2. Generate new ED25519 key pair (N+1) in a 0700 temp dir on localhost
#   3. Convert to PPK v2 and assert the format
#   4. Add N+1 to authorized_keys (fail-safe: N and N+1 are both valid)
#   5. Update CyberArk with the N+1 private key
#   6. Remove N-1 from authorized_keys if it existed before this rotation
#   7. Always: delete the temp dir regardless of success or failure
#
# Key material is read directly via lookup('file') at template evaluation time
# rather than slurp+register+set_fact, which avoids delegate_to / no_log scoping issues.

- name: "Create secure temp dir for {{ _account.name }}"
  ansible.builtin.tempfile:
    state: directory
    prefix: "cyberark_ssh_"
  register: _key_tmpdir
  delegate_to: localhost

- name: "Set temp dir permissions for {{ _account.name }}"
  ansible.builtin.file:
    path: "{{ _key_tmpdir.path }}"
    mode: "0700"
  delegate_to: localhost

- name: "Rotate key for {{ _account.name }}"
  block:

    - name: "Set authorized_keys path for {{ _account.name }}"
      ansible.builtin.set_fact:
        _cyberark_ak_path: "{{ cyberark_ssh_key_home_base }}/{{ _account.userName }}/.ssh/authorized_keys"

    # Step 1 — capture current managed key lines before generating the new one.
    # stdout_lines will be [] (first rotation), [N] (one previous rotation),
    # or [N-1, N] (two or more previous rotations). The full list is removed in
    # step 6 now that CyberArk holds N+1. become: true required — .ssh is mode 700.
    - name: "Read existing managed keys for {{ _account.name }}"
      ansible.builtin.shell: >
        grep "cark_managed_{{ _account.name }}"
        {{ _cyberark_ak_path }} 2>/dev/null || true
      register: _existing_managed_keys
      become: true
      changed_when: false

    # Step 2 — generate N+1
    - name: "Generate ED25519 key pair for {{ _account.name }}"
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -t
          - "{{ cyberark_ssh_key_algorithm }}"
          - -f
          - "{{ _key_tmpdir.path }}/id_{{ _account.name }}"
          - -N
          - ""
          - -C
          - "cark_managed_{{ _account.name }}"
      delegate_to: localhost
      no_log: true

    # Step 3 — convert and assert PPK v2
    - name: "Convert to PPK v2 for {{ _account.name }}"
      ansible.builtin.shell: >-
        puttygen "{{ _key_tmpdir.path }}/id_{{ _account.name }}"
        -O private --ppk-param version=2
        -o "{{ _key_tmpdir.path }}/id_{{ _account.name }}.ppk"
        2>/dev/null
        ||
        puttygen "{{ _key_tmpdir.path }}/id_{{ _account.name }}"
        -O private
        -o "{{ _key_tmpdir.path }}/id_{{ _account.name }}.ppk"
      delegate_to: localhost
      no_log: true

    - name: "Verify PPK v2 header for {{ _account.name }}"
      ansible.builtin.command:
        argv:
          - head
          - -n
          - "1"
          - "{{ _key_tmpdir.path }}/id_{{ _account.name }}.ppk"
      register: _ppk_header
      changed_when: false
      delegate_to: localhost

    - name: "Assert PPK v2 format for {{ _account.name }}"
      ansible.builtin.assert:
        that: "'PuTTY-User-Key-File-2' in _ppk_header.stdout"
        fail_msg: >-
          puttygen produced {{ _ppk_header.stdout | trim }} for {{ _account.name }}.
          Expected PPK v2. Add --ppk-param version=2 or check puttygen version.

    # Step 4 — fail-safe: add N+1 before touching CyberArk so both N and N+1 are valid.
    # lineinfile with explicit path avoids the getpwnam ambiguity of the authorized_key module.
    - name: "[DRY RUN] Add N+1 to authorized_keys: {{ _account.name }}"
      ansible.builtin.debug:
        msg: >-
          lineinfile: path={{ _cyberark_ak_path }}
          line={{ lookup('file', _key_tmpdir.path + '/id_' + _account.name + '.pub') | trim }}
          state=present
      when: cyberark_dry_run | bool

    - name: "Ensure .ssh dir exists for {{ _account.userName }}"
      ansible.builtin.file:
        path: "{{ _cyberark_ak_path | dirname }}"
        state: directory
        owner: "{{ _account.userName }}"
        group: "{{ _account.userName }}"
        mode: "0700"
      become: true
      when: not cyberark_dry_run | bool

    - name: "Add N+1 public key to authorized_keys for {{ _account.name }}"
      ansible.builtin.lineinfile:
        path: "{{ _cyberark_ak_path }}"
        line: "{{ lookup('file', _key_tmpdir.path + '/id_' + _account.name + '.pub') | trim }}"
        create: true
        owner: "{{ _account.userName }}"
        group: "{{ _account.userName }}"
        mode: "0600"
      become: true
      when: not cyberark_dry_run | bool

    - name: "DEBUG — authorized_keys state for {{ _account.name }}"
      ansible.builtin.shell: |
        echo "=== .ssh dir ==="
        ls -la {{ _cyberark_ak_path | dirname }} 2>&1 || true
        echo "=== authorized_keys ==="
        cat {{ _cyberark_ak_path }} 2>&1 || true
      register: _debug_authkeys
      become: true
      changed_when: false
      when: not cyberark_dry_run | bool

    - name: "DEBUG — fingerprint of generated public key for {{ _account.name }}"
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -lf
          - "{{ _key_tmpdir.path }}/id_{{ _account.name }}.pub"
      register: _debug_fingerprint
      changed_when: false
      delegate_to: localhost
      when: not cyberark_dry_run | bool

    - name: "DEBUG — show authorized_keys and key fingerprint for {{ _account.name }}"
      ansible.builtin.debug:
        msg:
          - "{{ _debug_authkeys.stdout_lines }}"
          - "fingerprint: {{ _debug_fingerprint.stdout | trim }}"
      when: not cyberark_dry_run | bool

    # Step 5 — update CyberArk with N+1 private key
    - name: "[DRY RUN] Update CyberArk with new private key: {{ _account.name }}"
      ansible.builtin.debug:
        msg: >-
          POST /passwordvault/api/Accounts/{{ _account.id }}/Password/Update
          — would store new PPK v2 private key (len={{ lookup('file', _key_tmpdir.path + '/id_' + _account.name + '.ppk') | length }})
      when: cyberark_dry_run | bool

    - name: "Update CyberArk with new private key: {{ _account.name }}"
      ansible.builtin.uri:
        url: >-
          https://{{ cyberark_subdomain }}.privilegecloud.cyberark.cloud/passwordvault/api/Accounts/{{
            _account.id
          }}/Password/Update
        method: POST
        headers:
          Authorization: "Bearer {{ cyberark_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          NewCredentials: "{{ lookup('file', _key_tmpdir.path + '/id_' + _account.name + '.ppk') | regex_replace('(?<!\r)\n', '\r\n') }}"
        status_code: 200
        validate_certs: "{{ cyberark_validate_certs }}"
      register: _cyberark_update_result
      delegate_to: localhost
      no_log: true
      when: not cyberark_dry_run | bool

    # Step 5b — verify SSH auth from control node using the new key.
    # Proves the key is correctly installed before we remove the old ones.
    - name: "DEBUG — verify SSH auth with new key for {{ _account.name }}"
      ansible.builtin.command:
        argv:
          - ssh
          - -i
          - "{{ _key_tmpdir.path }}/id_{{ _account.name }}"
          - -o
          - StrictHostKeyChecking=no
          - -o
          - BatchMode=yes
          - -o
          - ConnectTimeout=10
          - -o
          - IdentitiesOnly=yes
          - "{{ _account.userName }}@{{ inventory_hostname }}"
          - "true"
      register: _ssh_verify
      delegate_to: localhost
      ignore_errors: true
      changed_when: false
      when: not cyberark_dry_run | bool

    - name: "DEBUG — SSH auth result for {{ _account.name }}"
      ansible.builtin.debug:
        msg: "SSH auth test: {{ 'PASSED — key is correctly installed' if _ssh_verify.rc == 0 else 'FAILED (rc=' + (_ssh_verify.rc | string) + '): ' + _ssh_verify.stderr }}"
      when: not cyberark_dry_run | bool

    - name: "DEBUG — sshd effective config for {{ _account.name }}"
      ansible.builtin.shell: >
        sshd -T -C user={{ _account.userName }} 2>/dev/null
        | grep -iE 'authorizedkeysfile|pubkeyauthentication|allowusers|maxauthtries'
        || grep -iE 'AuthorizedKeysFile|PubkeyAuthentication|AllowUsers|MaxAuthTries' /etc/ssh/sshd_config
      register: _sshd_config_check
      become: true
      changed_when: false
      ignore_errors: true
      when: not cyberark_dry_run | bool

    - name: "DEBUG — show sshd config for {{ _account.name }}"
      ansible.builtin.debug:
        var: _sshd_config_check.stdout_lines
      when: not cyberark_dry_run | bool

    # Step 6 — remove all pre-rotation managed keys now that CyberArk holds N+1.
    # Loops over the exact lines captured in step 1 so only keys that existed before
    # this rotation are removed. N+1 (added in step 4) is not in this list.
    - name: "[DRY RUN] Remove pre-rotation keys from authorized_keys: {{ _account.name }}"
      ansible.builtin.debug:
        msg: >-
          lineinfile: path={{ _cyberark_ak_path }}
          regexp={{ item | regex_escape() }} state=absent
      loop: "{{ _existing_managed_keys.stdout_lines }}"
      when:
        - cyberark_dry_run | bool
        - _existing_managed_keys.stdout_lines | length > 0

    - name: "Remove pre-rotation managed keys from authorized_keys for {{ _account.name }}"
      ansible.builtin.lineinfile:
        path: "{{ _cyberark_ak_path }}"
        regexp: "{{ item | regex_escape() }}"
        state: absent
      become: true
      loop: "{{ _existing_managed_keys.stdout_lines }}"
      when:
        - not cyberark_dry_run | bool
        - _existing_managed_keys.stdout_lines | length > 0

  always:
    - name: "Remove temp dir for {{ _account.name }}"
      ansible.builtin.file:
        path: "{{ _key_tmpdir.path }}"
        state: absent
      delegate_to: localhost
      no_log: true
